name: dotfiles CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint dotfiles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y shellcheck

          # Install stylua
          # home/default.nix の stylua（nixpkgs）とバージョンを揃えること
          STYLUA_VERSION="v2.5.2"
          mkdir -p ~/.local/bin
          curl -L "https://github.com/JohnnyMorganz/StyLua/releases/download/${STYLUA_VERSION}/stylua-linux-x86_64.zip" -o stylua.zip
          unzip stylua.zip
          chmod +x stylua
          mv stylua ~/.local/bin/
          rm stylua.zip
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run linting checks
        run: |
          set -e
          echo "📝 Checking shell scripts..."
          find scripts/ -name "*.sh" -exec shellcheck {} +

          echo "🎨 Checking Lua formatting..."
          stylua --check config/nvim/

  gitleaks:
    runs-on: ubuntu-latest
    name: Secret scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 全履歴をスキャンする

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nix:
    runs-on: macos-latest
    name: Nix flake check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Flake check
        run: |
          nix flake check
          nix build .#darwinConfigurations.yuucu-mac.system --dry-run
