name: dotfiles CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチで新しい実行が始まったら進行中の実行をキャンセルする
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 既定は読み取りのみ。書き込みが必要な job で個別に補う
permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    name: Secret scan
    permissions:
      contents: read
      pull-requests: write # gitleaks-action が PR にコメントを残すため
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # 全履歴をスキャンする

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nix:
    runs-on: macos-latest
    name: Nix flake check
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      # checks.lint（shellcheck / stylua / nixfmt / statix / deadnix）も
      # ここでビルドされる。ツールのバージョンは flake.lock で固定
      # darwinConfigurations の attribute 名は username に追従して動的なため、
      # 名前を決め打ちせず flake 自身に問い合わせてからビルドする
      - name: Flake check
        run: |
          nix flake check
          target=$(nix eval .#darwinConfigurations --apply 'cfgs: builtins.head (builtins.attrNames cfgs)' --raw)
          nix build ".#darwinConfigurations.${target}.system" --dry-run
