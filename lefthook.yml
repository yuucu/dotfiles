pre-commit:
  parallel: true
  commands:
    lint-staged:
      run: scripts/lint-staged.sh
    gitleaks:
      run: gitleaks git --pre-commit --staged --no-banner --redact

pre-push:
  commands:
    # lint 群（shellcheck / stylua / nixfmt / statix / deadnix）の最終確認。
    # 重い build dry-run と全履歴 gitleaks は GitHub Actions に任せる。
    flake-check:
      run: nix flake check
